name: Feature Request
description: 提出一个新功能建议
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 这个功能要解决什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你希望如何实现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他方案（可选）

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 其他上下文、截图或参考链接（可选）
